name: Build and push SAM3 worker image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - sam3/**
      - .github/workflows/build.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bgless-sam3:latest
            ghcr.io/${{ github.repository_owner }}/bgless-sam3:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
